<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Celin Company</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#000;
      color:#fff;
    }

    header{
      width:100%;
      padding:35px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      header{
    border-bottom:1px solid rgba(255,255,255,.15);
    }

    .brand{
      font-size:22px;
      letter-spacing:3px;
      font-weight:500;
    }

    nav a{
      margin-left:28px;
      text-decoration:none;
      color:#111;
      font-size:15px;
    }

    nav a:hover{
      color:#777;
    }

    .hero{
      min-height:75vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:60px 25px;
    }

    .logo{
      max-width:420px;
      width:80%;
      margin-bottom:45px;
    }

    h1{
      font-size:46px;
      letter-spacing:4px;
      font-weight:500;
      margin-bottom:20px;
    }

    .tagline{
      font-size:24px;
      margin-bottom:35px;
    }

    .coming{
      font-size:18px;
      margin-bottom:35px;
    }

    .button{
      display:inline-block;
      padding:14px 35px;
      border:1px solid #111;
      color:#111;
      text-decoration:none;
      font-size:15px;
      letter-spacing:1px;
    }

    .button:hover{
      background:#111;
      color:#fff;
    }

    .socials{
      margin-top:45px;
    }

    .socials a{
      margin:0 12px;
      text-decoration:none;
      color:#111;
      font-size:14px;
      letter-spacing:1px;
    }

    footer{
      text-align:center;
      padding:40px 20px;
      font-size:14px;
      color:#555;
    }

    @media(max-width:700px){
      header{
        flex-direction:column;
        gap:20px;
      }

      nav a{
        margin:0 8px;
        font-size:14px;
      }

      h1{
        font-size:32px;
      }

      .tagline{
        font-size:20px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">THE CELIN COMPANY</div>
    <nav>
      <a href="#">Home</a>
      <a href="#about">About Us</a>
      <a href="#jobs">Jobs</a>
      <a href="#faqs">FAQs</a>
    </nav>
  </header>

  <main class="hero">
    <img src="4927BAFE-AC9D-4FDE-BDD9-15A14A83DD23.png" alt="The Celin Company Logo" class="logo">

    <h1>THE CELIN COMPANY</h1>

    <p class="tagline">Making Dreams A Reality</p>

    <p class="coming">We are An independent film production company dedicated to cinematic storytelling, emotional truth, and original film and television projects.</p>

    <a href="#about" class="button">Learn More</a>

    <div class="socials">
      <a href="#">LinkedIn</a>
      <a href="#">Instagram</a>
      <a href="#">Facebook</a>
    </div>
  </main>

  <footer>
    ©2026 by The Celin Company.
  </footer>

</body>
</html>
